<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉伊大师 - 忘记密码</title>
    <link rel="stylesheet" href="/static/css/login.css?v=20260226-auth-4">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">
            <h1>重置密码</h1>
            <p class="sub">先完成手机号验证码校验，再设置新密码。</p>

            <label class="field-label" for="phoneInput">手机号</label>
            <input id="phoneInput" type="tel" maxlength="11" placeholder="请输入11位手机号">

            <label class="field-label" for="codeInput">验证码</label>
            <div class="code-row">
                <input id="codeInput" type="text" maxlength="6" placeholder="请输入6位验证码">
                <button id="sendCodeBtn" type="button">发送验证码</button>
            </div>

            <div class="actions single">
                <button id="verifyCodeBtn" type="button">校验验证码</button>
            </div>

            <label class="field-label" for="newPasswordInput">新密码</label>
            <input id="newPasswordInput" type="password" maxlength="12" placeholder="请输入8-12位字母或数字">

            <label class="field-label" for="confirmPasswordInput">确认新密码</label>
            <input id="confirmPasswordInput" type="password" maxlength="12" placeholder="请再次输入新密码">

            <div class="actions single">
                <button id="resetBtn" type="button" class="secondary">确认重置密码</button>
            </div>

            <p id="statusText" class="status"></p>
            <p class="hint"><a href="/login">返回登录</a></p>
            <p class="hint">密码仅支持字母和数字，长度8-12位。</p>
            <p class="hint">演示版本：验证码会直接显示在页面提示中，后续可接短信服务。</p>
        </section>
    </main>

    <script src="/static/js/reset_password.js?v=20260226-reset-1"></script>
</body>
</html>
